backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/img"
public_folder: "/assets/img"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "wiki"
    label: "Wiki Articles"
    folder: "src/wiki"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Topic", name: "topic", widget: "select", options: ["Structural Systems", "Roofing", "Plumbing", "Electrical", "HVAC", "Exterior & Siding", "Interior & Finishes", "Insulation & Ventilation", "Foundations & Basements", "Fire & Safety", "Standards of Practice", "Business & Marketing"] }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "glossary"
    label: "Glossary Terms"
    folder: "src/glossary"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Term", name: "title", widget: "string" }
      - { label: "Definition", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    folder: "src/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
